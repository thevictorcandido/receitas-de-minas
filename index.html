<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas de Minas</title>
</head>
<body>
    <header>
        <h1>Delícias de Minas</h1>
    </header>

    <main>
        <section>
            <h2>Pão de Queijo</h2>
            <img src="img/pao_de_queijo.jpg" alt="pao de queijo" width="400px" height="300px">
            <button popovertarget="segredo">Ver segredo do chefe</button>
            <div id="segredo" popover>
                <p>
                    Jamais coloque os ovos com a massa quente,
                    senão eles cozinham e o pão não cresce!
                </p>
            </div>
        </section>
    </main>

</body>
</html>
